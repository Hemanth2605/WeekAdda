<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>WeekAdda — New Movie Releases This Week, OTT Arrivals India & Cricket Updates</title>
    <meta
      name="description"
      content="Track this week's new movie releases in Hindi, Telugu, Tamil, Malayalam, Kannada, English and 12+ languages. Daily-updated OTT arrivals on Netflix, Prime Video, JioHotstar, Sony LIV, ZEE5 & Aha. Plus cricket results and fixtures week by week."
    />
    <meta
      name="keywords"
      content="new movie releases this week, OTT releases this week India, new movies on Netflix India, JioHotstar new releases, Amazon Prime new movies, Telugu movies this week, Tamil new releases, Hindi movies 2026, Malayalam OTT releases, upcoming movies India, web series releases, cricket results, cricket fixtures"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://weekadda.com/" />
    <meta name="theme-color" content="#0a0a0e" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WeekAdda" />
    <meta property="og:title" content="WeekAdda — New Movie Releases, OTT Arrivals India & Cricket Updates" />
    <meta
      property="og:description"
      content="This week's movie releases in every Indian language, daily OTT arrivals on Netflix, Prime Video, JioHotstar & more. Plus cricket results and fixtures."
    />
    <meta property="og:url" content="https://weekadda.com/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WeekAdda — Movie Releases & OTT Arrivals India" />
    <meta
      name="twitter:description"
      content="Weekly movie releases by language + daily OTT arrivals on Netflix, Prime Video, JioHotstar, Sony LIV, ZEE5 & Aha."
    />

    <!-- Structured data: site + search action -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "WeekAdda",
        "alternateName": "WeekAdda Entertainment",
        "url": "https://weekadda.com/",
        "description": "New movie releases by language, OTT arrivals in India, and cricket updates.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://weekadda.com/movies?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230a0a0e'/><rect x='4' y='4' width='92' height='92' rx='20' fill='none' stroke='%23e8b34b' stroke-width='4'/><text x='50' y='66' font-size='42' font-weight='bold' font-family='Georgia, serif' fill='%23e8b34b' text-anchor='middle' letter-spacing='-2'>WA</text></svg>" />
    <script>
      // Apply the saved theme before first paint; dark is the default
      try {
        if (localStorage.getItem('weekadda-theme') === 'light')
          document.documentElement.dataset.theme = 'light'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
